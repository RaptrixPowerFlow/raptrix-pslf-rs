# Triggered by pushing a version tag, e.g.:
#   git tag vX.Y.Z && git push origin vX.Y.Z
#
# Builds release binaries for Windows, Linux, and macOS and attaches them to
# the GitHub Release that is created automatically for the tag.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_run:
    workflows:
      - Auto Tag Release
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_label: windows
            arch_label: x86_64
            extension: zip

          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_label: linux
            arch_label: x86_64
            extension: tar.gz

          - os: macos-latest
            target: aarch64-apple-darwin
            os_label: macos
            arch_label: arm64
            extension: tar.gz

    steps:
      - uses: actions/checkout@v5
        if: github.event_name != 'workflow_run'

      - uses: actions/checkout@v5
        if: github.event_name == 'workflow_run'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Assert tag matches Cargo.toml (tag builds only)
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          TAG_VER="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(grep '^version = ' Cargo.toml | head -n1 | cut -d '"' -f2)
          if [[ "${TAG_VER}" != "${CARGO_VER}" ]]; then
            echo "::error::Git tag '${GITHUB_REF_NAME}' (semver ${TAG_VER}) must equal [package].version in Cargo.toml (${CARGO_VER}) so release artifacts match the crate."
            exit 1
          fi
          echo "OK: tag ${GITHUB_REF_NAME} matches Cargo.toml version ${CARGO_VER}"

      - name: Install Rust toolchain (test gate)
        uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt, clippy

      - name: Pre-release checkpoint
        shell: pwsh
        run: ./scripts/pre-release-check.ps1

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(grep '^version = ' Cargo.toml | head -n1 | cut -d '"' -f2)
            echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.96
        with:
          components: rustfmt, clippy
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\scripts\package-windows.ps1 -Target "${{ matrix.target }}" -ArchLabel "${{ matrix.arch_label }}" -Version "${{ steps.version.outputs.value }}"

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          chmod +x ./scripts/package-unix.sh
          ./scripts/package-unix.sh "${{ matrix.target }}" "${{ matrix.os_label }}" "${{ matrix.arch_label }}" "${{ steps.version.outputs.value }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: raptrix-pslf-rs-${{ matrix.os_label }}-${{ matrix.arch_label }}
          path: dist/raptrix-pslf-rs-v${{ steps.version.outputs.value }}-${{ matrix.os_label }}-${{ matrix.arch_label }}.${{ matrix.extension }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
        if: github.event_name != 'workflow_run'

      - uses: actions/checkout@v5
        if: github.event_name == 'workflow_run'
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Assert tag matches Cargo.toml (tag builds only)
        if: github.ref_type == 'tag'
        shell: bash
        run: |
          set -euo pipefail
          TAG_VER="${GITHUB_REF_NAME#v}"
          CARGO_VER=$(grep '^version = ' Cargo.toml | head -n1 | cut -d '"' -f2)
          if [[ "${TAG_VER}" != "${CARGO_VER}" ]]; then
            echo "::error::Git tag '${GITHUB_REF_NAME}' (semver ${TAG_VER}) must equal [package].version in Cargo.toml (${CARGO_VER})."
            exit 1
          fi

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(grep '^version = ' Cargo.toml | head -n1 | cut -d '"' -f2)
            echo "value=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v${{ steps.version.outputs.value }}
          target_commitish: ${{ github.event.workflow_run.head_sha || github.sha }}
          generate_release_notes: true
          files: artifacts/*
